<template>
    <lightning-card>
        <lightning-layout multiple-rows>
            <lightning-layout-item size="2" padding="around-small" small-device-size="1" medium-device-size="1"
                large-device-size="2">
                <div class="custom-box">
                    <c-case-study-navigation onnavigate={handleNavigate}></c-case-study-navigation>
                </div>
            </lightning-layout-item>

            <template lwc:if={isContact}>
                <lightning-layout-item size="6" padding="around-small" small-device-size="2" medium-device-size="4"
                    large-device-size="6">
                    <div class="custom-box">
                        <c-contact-browser></c-contact-browser>
                    </div>
                </lightning-layout-item>
                <lightning-layout-item size="4" padding="around-small" small-device-size="1" medium-device-size="2"
                    large-device-size="4">
                    <div class="custom-box">
                        <c-contact-details></c-contact-details>
                    </div>
                </lightning-layout-item>
            </template>
            <template lwc:if={isReport}>
                <lightning-layout-item size="6" padding="around-small" small-device-size="2" medium-device-size="4"
                    large-device-size="6">
                    <div class="custom-box">
                        <c-case-browser></c-case-browser>
                    </div>
                </lightning-layout-item>
                <lightning-layout-item size="4" padding="around-small" small-device-size="1" medium-device-size="2"
                    large-device-size="4">
                    <div class="custom-box">
                        <c-case-details></c-case-details>
                    </div>
                </lightning-layout-item>
            </template>
            
            <template lwc:if={isGraph}>
                    <lightning-layout-item size="10" padding="around-small">
                            <c-opportunity-graph></c-opportunity-graph>
                    </lightning-layout-item>
            </template>
        </lightning-layout>
    </lightning-card>
</template>
