<template>
    <lightning-card title="Opportunities" icon-name="standard:opportunity">
        <lightning-button-group slot="actions">
            <lightning-button label="Won Deals" onclick={loadWonDeals}></lightning-button>
            <lightning-button label="Lost Deals" onclick={loadLostDeals}></lightning-button>
        </lightning-button-group>
            <!-- custom data table -->
            <table class="slds-table slds-table_bordered slds-table_col-bordered slds-table_striped">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Stage Name</th>
                        <th>Close Date</th>
                        <th>Amount</th>
                    </tr>
                </thead>
                <tbody>
                    <template for:each={oppList} for:item="obj">
                        <tr key={obj.Id}>
                            <td>{obj.Name}</td>
                            <td>{obj.StageName}</td>
                            <td>{obj.CloseDate}</td>
                            <td>{obj.Amount}</td>
                        </tr>
                    </template>
                </tbody>
            </table>
    </lightning-card>
</template>
