<template>
    <!-- custom data table -->
    <table class="slds-table slds-table_bordered slds-table_col-bordered slds-table_striped">
        <thead>
            <tr>
                <th>Name</th>
                <th>Stage Name</th>
                <th>Close Date</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody>
            <template for:each={wireOpportunities.data} for:item="obj">
                <tr key={obj.Id}>
                    <td>{obj.Name}</td>
                    <td>{obj.StageName}</td>
                    <td>{obj.CloseDate}</td>
                    <td>{obj.Amount}</td>
                </tr>
            </template>
        </tbody>
    </table>
</template>
