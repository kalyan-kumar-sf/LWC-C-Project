<template>
    <div class="slds-box">
        <table class="slds-table slds-table_bordered slds-table_col-bordered slds-table_striped">
            <thead>
                <tr class="slds-line-height_reset">
                    <th> First Name </th>
                    <th> Last Name </th>
                    <th> Email </th>
                    <th> Phone </th>
                </tr>
            </thead>
            <tbody>
                <template for:each={conList} for:item="obj">
                <tr key={obj.Id} onclick={handleClick} data-conid={obj.Id}>
                   <td>{obj.FirstName}</td>
                   <td>{obj.LastName}</td>
                   <td>{obj.Email}</td>
                   <td>{obj.Phone}</td>
                </tr>
                </template>
            </tbody>
        </table>
    </div>
</template>
